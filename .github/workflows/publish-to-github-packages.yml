name: Publish to GitHub Packages

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install clang and boltffi
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          cargo install boltffi_cli

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Build native libraries and generate bindings
        working-directory: mermaid-ffi
        run: boltffi pack kmp --release --experimental

      - name: Grant execute permission for gradlew
        run: chmod +x mermaid-ffi/dist/kotlin-multiplatform/gradlew

      - name: Publish to GitHub Packages
        working-directory: mermaid-ffi/dist/kotlin-multiplatform
        run: |
          ./gradlew publishAllPublicationsToGitHubPackagesRepository \
            -Pgpr.user="${{ github.actor }}" \
            -Pgpr.key="${{ secrets.GITHUB_TOKEN }}" \
            -Pversion="$VERSION" \
            -Pgroup="com.storyteller_f.mermaid"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
