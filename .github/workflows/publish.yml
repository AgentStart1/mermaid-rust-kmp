name: Publish to Maven Central & npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android,wasm32-unknown-unknown

      - name: Install clang, boltffi, and wasm-opt
        run: |
          sudo apt-get update && sudo apt-get install -y clang
          cargo install boltffi_cli
          cargo install wasm-opt
          npm install -g typescript

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build native libraries and generate bindings
        working-directory: mermaid-ffi
        run: |
          boltffi pack kmp --release --experimental
          boltffi pack wasm --release

      - name: Set npm package version and publish
        working-directory: mermaid-ffi/dist/wasm/pkg
        run: |
          npm version "$VERSION" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Patch generated files
        run: ./patch-ffi.sh "$VERSION"

      - name: Publish to Maven Central
        working-directory: mermaid-ffi/dist/kotlin-multiplatform
        run: |
          ./gradlew publishAllPublicationsToMavenCentralRepository \
            -Pversion="$VERSION" \
            -Pgroup="io.github.storytellerf"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
